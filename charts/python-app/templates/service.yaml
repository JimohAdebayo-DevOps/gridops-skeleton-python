apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    # Safely fallback to port 80 if the developer omits it from values.yaml
    - port: {{ .Values.service.port | default 80 }}
      
      # ARCHITECTURAL FIX: Route to the named port 'http' on the container, 
      # decoupling the Service from hardcoded application ports.
      targetPort: http
      
      protocol: TCP
      name: http
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    app: {{ .Release.Name }}
